name: Build KittyPrivSystem

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'Makefile'
      - 'kittypriv.manifest'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install MSYS2 (for make/gcc)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-make
      
      - name: Build KittyPrivSystem
        shell: msys2 {0}
        run: |
          make -f Makefile
      
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: KittyPrivSystem
          path: KittyPrivSystem.exe
